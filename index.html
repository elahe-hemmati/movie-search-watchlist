<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Watchlist</title>
    <link rel="icon" type="image/x-icon" href="./img/favicon/favicon.ico" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <!-- Toast / Alert -->
    <div id="toast" class="toast hidden"></div>
    <div class="app-container">
      <header class="header">
        <h1>واچ‌لیست فیلم</h1>
        <p>فیلم‌ها را از API جستجو کنید.</p>
      </header>

      <!-- Search Section -->
      <section class="panel">
        <h2>جستجوی فیلم</h2>
        <form class="search-box" id="search">
          <input
            type="text"
            id="search-input"
            placeholder="نام فیلم را وارد کنید..."
          />
          <button type="submit" id="search-btn">جستجو</button>
          <button type="button" id="clear-search-btn" class="secondary">
            پاک کردن
          </button>
        </form>
      </section>

      <!-- Search Results -->
      <section class="panel">
        <h2>نتایج جستجو</h2>
        <div id="search-results" class="cards-grid"></div>
      </section>

      <!-- Watchlist -->
      <section class="panel">
        <h2>واچ‌لیست من</h2>
        <div class="panel-control">
          <p class="movie-count">
            تعداد فیلم‌ها در لیست: <span id="counter"></span>
          </p>
          <button class="clear-all-btn" id="clear-all-btn">پاک کردن همه</button>
        </div>
        <div id="watchlist" class="cards-grid"></div>
      </section>
      <footer>
        <p class="footer-center">
          &#169; کپی‌رایت <span id="date"></span> | کلیه حقوق مادی و معنوی این
          وب‌سایت متعلق به الهه همتی است. هرگونه کپی‌برداری یا بازنشر محتوا بدون
          ذکر منبع و کسب اجازه کتبی، ممنوع است.
        </p>
      </footer>
    </div>

    <script src="./js/api.js"></script>
    <script src="./js/watchlist.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/toast.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
